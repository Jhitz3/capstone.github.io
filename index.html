<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Pet</title>
    <link href="css1.css" rel="stylesheet">
</head>

<body>

<!--nav bar-->
<div id="rectangle1">
    <nav>
        <ul> 
            <div id="rectangle2"><li><a href="login.html">Account</a></li></div>
            <div id="rectangle2"><li><a href="habit-tracker.html">Habit Tracker</a></li></div>
            <div id="rectangle2"><li><a href="index.html">My Pet</a></li></div>
        </ul>

        <!-- hamburger menu -->
        <button id="menuToggle" aria-controls="topMenu" aria-expanded="false" aria-label="Open menu" class="menu-toggle">
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
        </button>

        <div id="topMenu" class="top-menu">
            <div class="top-menu-user">Not signed in</div>
            <a id="loginLinkBtn" class="btn" href="login.html">Sign in</a>
            <button id="logoutBtn" class="btn secondary">Logout</button>
        </div>
    </nav>
</div>

<!--page title-->
<div class="yellowbox">
    <h1>My Pet</h1>
</div>

<!--main content box-->
<div class="purplebox">
    <br>

    <!--pet-->
     <div class="periwinklebox">
        <h2>Select Your Pet:</h2>

        <div class="petChoicesContainer">
            <img src="black.png" class="petChoice" data-pet="black.png">
            <img src="calico.png" class="petChoice" data-pet="calico.png">
            <img src="orange.png" class="petChoice" data-pet="orange.png">
            <img src="siamese.png" class="petChoice" data-pet="siamese.png">
        </div>
    </div>

    <br></br>

    <div id="petContainer" class="pet-wrapper">
        <img id="petImage" src="black.png" alt="black cat">
    </div>

    <br><br>

    <!--action buttons-->
    <div class="periwinklebox">
        <h2 id="pointDisplay">Points: 0</h2>
        <button id="feedBtn" class="btn">Feed (2 pts)</button>
        <button id="playBtn" class="btn">Play (2 pts)</button>
        <button id="groomBtn" class="btn">Groom (2 pts)</button>
    </div>

    <!--debugging-->
    <div id="debugPanel" class="periwinklebox" style="display:none; margin-top:20px;">
        <h3>Debug: Add Points</h3>
        <button id="dbgAdd5" class="btn">+5 Points</button>
        <button id="dbgAdd10" class="btn">+10 Points</button>
    </div>

    <br>
</div>

<script src="indexjs.js"></script>

</body>

</html>
